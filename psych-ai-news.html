<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MindFeed — 심리학 × AI 뉴스 / Psychology × AI News</title>
<meta name="description" content="심리학과 AI 연구 최신 뉴스를 AI 요약으로 빠르게">
<meta name="theme-color" content="#0d0f12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MindFeed">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #0d0f12;
    --surface: #161a1f;
    --surface2: #1e242c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaed;
    --muted: #7a8290;
    --accent: #6ee7b7;
    --accent2: #93c5fd;
    --accent3: #f9a8d4;
    --tag-psych: #1e3a2f;
    --tag-psych-text: #6ee7b7;
    --tag-ai: #1e2a3a;
    --tag-ai-text: #93c5fd;
    --tag-neuro: #2d1e3a;
    --tag-neuro-text: #c4b5fd;
    --tag-behav: #3a2a1e;
    --tag-behav-text: #fbbf24;
    --font-main: 'Gowun Dodum', sans-serif;
    --font-serif: 'Noto Serif KR', serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }
 
  html {
    scroll-behavior: smooth;
    /* PWA 상태바 Safe Area */
    padding-top: env(safe-area-inset-top);
    background-color: #0d0f12;
  }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }
 
  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #0d0f12;
    border-bottom: 0.5px solid var(--border2);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
 
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
 
  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #6ee7b7, #93c5fd);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
 
  .logo-text {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 17px;
    color: var(--text);
    letter-spacing: -0.3px;
  }
 
  .logo-sub {
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
 
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
 
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--accent);
    background: rgba(110,231,183,0.08);
    border: 0.5px solid rgba(110,231,183,0.2);
    border-radius: 20px;
    padding: 4px 10px;
  }
 
  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
 
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
 
  .refresh-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text);
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-family: var(--font-main);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
 
  .refresh-btn:hover { background: #252d38; border-color: var(--border2); }
  .refresh-btn:active { transform: scale(0.97); }
 
  /* ===== FILTER BAR ===== */
  .filter-bar {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
 
  .filter-label {
    font-size: 14px;
    color: var(--muted);
    font-family: var(--font-mono);
    white-space: nowrap;
    margin-right: 4px;
  }
 
  .filter-chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 14px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    font-family: var(--font-main);
  }
 
  .filter-chip:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
 
  .filter-chip.active {
    background: rgba(110,231,183,0.1);
    border-color: rgba(110,231,183,0.35);
    color: var(--accent);
  }
 
  /* ===== LAYOUT ===== */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 28px;
  }
 
  @media (max-width: 820px) {
    .container { grid-template-columns: 1fr; padding: 16px 14px 90px; }
    .sidebar { display: none; }
    .container > main { min-width: 0; }
    header { padding: 0 16px; height: 54px; }
    .logo-sub { display: none; }
    .live-badge { display: none; }
    .refresh-btn { padding: 6px 10px; font-size: 14px; }
    .filter-bar { padding: 10px 14px; gap: 8px; }
    .filter-chip { padding: 5px 11px; font-size: 15px; }
    .filter-label { display: none; }
    .news-card { padding: 16px; }
    .featured-card { padding: 18px; }
    .featured-title { font-size: 17px; padding-right: 70px; }
    .card-title { font-size: 15px; }
    .scroll-top { bottom: 80px; }
    .toast { bottom: 80px; }
  }
 
  /* ===== BOTTOM NAV (mobile only) ===== */
  .bottom-nav { display: none; }
 
  @media (max-width: 820px) {
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(13,15,18,0.96);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--border2);
      z-index: 200;
      align-items: center;
      justify-content: space-around;
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 16px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.18s;
      font-family: var(--font-main);
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-icon { font-size: 20px; line-height: 1; }
    .bottom-nav-label { font-size: 14px; font-family: var(--font-mono); }
  }
 
  /* ===== PWA INSTALL BANNER ===== */
  .install-banner {
    display: none;
    margin: 12px 14px 0;
    background: linear-gradient(135deg, rgba(110,231,183,0.08), rgba(147,197,253,0.08));
    border: 0.5px solid rgba(110,231,183,0.2);
    border-radius: var(--radius);
    padding: 14px 16px;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.4s ease;
  }
  .install-banner.visible { display: flex; }
  .install-banner-text { flex: 1; }
  .install-banner-title { font-size: 15px; color: var(--text); margin-bottom: 2px; }
  .install-banner-sub { font-size: 15px; color: var(--muted); font-family: var(--font-mono); }
  .install-btn {
    background: rgba(110,231,183,0.15);
    border: 0.5px solid rgba(110,231,183,0.3);
    color: var(--accent);
    font-size: 14px;
    font-family: var(--font-mono);
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .install-btn:active { background: rgba(110,231,183,0.25); }
  .install-close {
    background: none; border: none;
    color: var(--muted); font-size: 18px;
    cursor: pointer; padding: 4px; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
 
  @media (max-width: 820px) {
    .ai-summary-btn, .save-btn { min-height: 36px; }
    .news-card:active { background: var(--surface2); }
    .featured-card:active { border-color: rgba(110,231,183,0.4); }
  }
 
  /* ===== FEED ===== */
  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
 
  .feed-title {
    font-size: 15px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
 
  .sort-select {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--muted);
    font-size: 14px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    cursor: pointer;
  }
 
  .news-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
 
  .news-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.2s;
  }
 
  .card-thumbnail {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
    flex-shrink: 0;
    background: #0a0a0a;
  }
 
  .card-thumbnail svg {
    width: 100%;
    height: auto;
    display: block;
  }
 
  .featured-thumbnail {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 14px;
    background: #0a0a0a;
  }
 
  .featured-thumbnail svg {
    width: 100%;
    height: auto;
    display: block;
  }
 
  .news-card:hover { border-color: var(--border2); background: var(--surface2); }
  .news-card:hover::before { background: var(--accent); }
 
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
 
  .tag {
    font-size: 15px;
    font-family: var(--font-mono);
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
 
  .tag-psych { background: var(--tag-psych); color: var(--tag-psych-text); }
  .tag-ai { background: var(--tag-ai); color: var(--tag-ai-text); }
  .tag-neuro { background: var(--tag-neuro); color: var(--tag-neuro-text); }
  .tag-behav { background: var(--tag-behav); color: var(--tag-behav-text); }
 
  .card-source {
    font-size: 15px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
 
  .card-time {
    font-size: 15px;
    color: var(--muted);
    margin-left: auto;
  }
 
  .card-title {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 8px;
    white-space: pre-line;
  }
  .card-title .title-en {
    display: block;
    font-size: 15px;
    font-weight: 400;
    color: var(--muted);
    font-family: var(--font-main);
    margin-top: 3px;
  }
 
  .card-summary {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
 
  .card-footer {
    display: flex;
    align-items: center;
    gap: 12px;
  }
 
  .ai-summary-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-family: var(--font-mono);
    color: var(--accent2);
    background: rgba(147,197,253,0.07);
    border: 0.5px solid rgba(147,197,253,0.18);
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
  }
 
  .ai-summary-btn:hover { background: rgba(147,197,253,0.13); }
  .ai-summary-btn.cached {
    color: var(--accent);
    background: rgba(110,231,183,0.07);
    border-color: rgba(110,231,183,0.2);
  }
 
  .save-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: var(--radius-sm);
    transition: color 0.18s;
  }
 
  .save-btn:hover { color: var(--accent3); }
  .save-btn.saved { color: var(--accent3); }
 
  .read-link {
    margin-left: auto;
    font-size: 14px;
    font-family: var(--font-mono);
    color: var(--muted);
    text-decoration: none;
    transition: color 0.18s;
  }
  .read-link:hover { color: var(--text); }
 
  /* AI Summary Panel */
  .ai-panel {
    background: rgba(147,197,253,0.04);
    border: 0.5px solid rgba(147,197,253,0.15);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-top: 12px;
    display: none;
  }
 
  .ai-panel.open { display: block; animation: fadeIn 0.25s ease; }
 
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
 
  .ai-panel-header {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 15px;
    font-family: var(--font-mono);
    color: var(--accent2);
    margin-bottom: 10px;
  }
 
  .ai-panel-body {
    font-size: 15px;
    color: #b0bac8;
    line-height: 1.8;
    white-space: pre-line;
  }
  .ai-panel-body p { margin-bottom: 10px; }
  .ai-panel-divider {
    border: none;
    border-top: 0.5px solid rgba(147,197,253,0.12);
    margin: 12px 0;
  }
  .ai-lang-label {
    font-size: 14px;
    font-family: var(--font-mono);
    color: rgba(147,197,253,0.5);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
 
  .ai-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
 
  .dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
 
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
 
  .key-points {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid rgba(147,197,253,0.1);
  }
 
  .key-point {
    display: flex;
    gap: 8px;
    font-size: 14px;
    color: #9ca8b8;
    margin-bottom: 5px;
  }
 
  .key-point::before {
    content: '▸';
    color: var(--accent2);
    flex-shrink: 0;
  }
 
  /* ===== SIDEBAR ===== */
  .sidebar { }
 
  .sidebar-section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 18px;
  }
 
  .sidebar-title {
    font-size: 14px;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .sidebar-title::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }
 
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
 
  .stat-card {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
  }
 
  .stat-num {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
 
  .stat-label {
    font-size: 15px;
    color: var(--muted);
  }
 
  .trend-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }
  .trend-item:last-child { border-bottom: none; padding-bottom: 0; }
  .trend-item:first-child { padding-top: 0; }
  .trend-item:hover .trend-keyword { color: var(--accent); }
 
  .trend-rank {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--muted);
    min-width: 20px;
    margin-top: 2px;
  }
 
  .trend-keyword {
    font-size: 15px;
    color: var(--text);
    transition: color 0.15s;
    line-height: 1.4;
  }
 
  .trend-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--muted);
    white-space: nowrap;
  }
 
  .source-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 15px;
  }
  .source-item:last-child { border-bottom: none; }
 
  .source-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
 
  .source-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--muted);
  }
 
  /* FEATURED CARD */
  .featured-card {
    background: linear-gradient(135deg, #0f2a1e 0%, #0f1e2a 100%);
    border: 0.5px solid rgba(110,231,183,0.2);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
 
  .featured-card::after {
    content: 'FEATURED';
    position: absolute;
    top: 16px;
    right: 16px;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 1px;
    background: rgba(110,231,183,0.1);
    padding: 3px 8px;
    border-radius: 4px;
    border: 0.5px solid rgba(110,231,183,0.2);
  }
 
  .featured-card:hover { border-color: rgba(110,231,183,0.4); }
 
  .featured-title {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.45;
    margin: 10px 0 10px;
    padding-right: 80px;
    white-space: pre-line;
  }
 
  .featured-summary {
    font-size: 15px;
    color: #8a9aaa;
    line-height: 1.65;
    margin-bottom: 14px;
  }
 
  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }
 
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
 
  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text);
    font-size: 15px;
    font-family: var(--font-mono);
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 999;
    transition: transform 0.3s ease;
  }
 
  .toast.show { transform: translateX(-50%) translateY(0); }
 
  /* Scroll top btn */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 38px;
    height: 38px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--muted);
    transition: all 0.2s;
    opacity: 0;
  }
  .scroll-top.visible { opacity: 1; }
  .scroll-top:hover { color: var(--text); background: #252d38; }
</style>
</head>
<body>
 
<header>
  <a href="#" class="logo">
    <div class="logo-icon">🧠</div>
    <div>
      <div class="logo-text">MindFeed</div>
      <div class="logo-sub">심리학 × AI 뉴스</div>
    </div>
  </a>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <button class="refresh-btn" onclick="refreshFeed()">
      ↻ 새로고침
    </button>

    summary: `MIT·스탠퍼드 공동 연구팀이 발표한 대규모 RCT에서 GPT-4 기반 챗봇이 경도 우울·불안 증상 완화에 있어 단기 CBT와 동등한 효과를 보였으며, 공감적 반응 평가에서는 평균 치료사보다 높은 점수를 기록했다.\nA large-scale RCT by MIT & Stanford found GPT-4-based chatbots as effective as short-term CBT for mild depression and anxiety, with higher empathy scores than average therapists.`,
    aiSummary: `이 연구는 MIT와 스탠퍼드 대학교가 공동으로 진행한 역대 최대 규모의 AI 심리치료 임상시험입니다. 총 6,000명의 참가자를 무작위로 세 그룹(AI 챗봇, 숙련된 인간 치료사, 대기자 대조군)으로 나누어 8주간 추적 관찰한 결과, AI 챗봇 그룹과 인간 치료사 그룹 사이에 통계적으로 유의미한 효과 차이가 없었습니다.\n\n특히 공감 반응 평가에서 AI가 인간 치료사 평균보다 12% 높은 점수를 기록했으며, 연구팀은 이를 AI의 일관된 비판단적 반응과 24시간 접근성 때문으로 분석했습니다. 다만 중증 환자(PHQ-9 점수 15점 이상)에서는 효과가 유의미하게 낮아 보조적 도구로 활용하는 것이 권장됩니다.\n\nThis is the largest AI psychotherapy RCT to date. 6,000 participants were assigned to three groups — AI chatbot, trained human therapist, and waitlist control — and followed for 8 weeks. Results showed no significant difference in outcomes between AI and human therapist groups.\n\nNotably, the AI scored 12% higher on empathy scales. Researchers attribute this to the AI's consistent, non-judgmental responses and 24/7 accessibility. However, effectiveness dropped significantly for severe cases (PHQ-9 ≥15), suggesting it is best used as a supplementary tool.`,

    source: `Psychological Science`,

    title: `수면 중 공포 기억 재활성화로 PTSD 증상 47% 감소 — 새로운 비약물 치료법 가능성\nReactivating Fear Memories During Sleep Reduces PTSD Symptoms by 47%`,
    summary: `수면 중 청각 단서를 통해 공포 기억을 재활성화하는 표적 기억 재활성화(TMR) 기법이 외상 후 스트레스 장애 치료에 효과적임을 입증하는 연구가 발표됐다.\nTargeted Memory Reactivation (TMR) using auditory cues during sleep has been shown to effectively reduce PTSD symptoms without pharmacological intervention.`,
    aiSummary: `표적 기억 재활성화(TMR)는 수면 중 특정 기억과 연관된 소리를 낮은 볼륨으로 재생해 해당 기억을 부드럽게 재활성화하는 기법입니다. 기억은 수면 중 서파 수면(SWS) 단계에서 공고화되는데, 이 시점에 개입하면 공포 기억의 감정적 강도를 약화시킬 수 있다는 신경과학적 원리를 활용합니다.\n\n연구팀은 124명의 PTSD 환자를 대상으로 4주간 매일 밤 수면 중 외상 관련 청각 단서를 재생했습니다. 그 결과 PTSD 핵심 증상이 평균 47% 감소했으며, 약물 치료와 병행 시 효과가 63%까지 증대됐습니다. 부작용이 없고 수면 중 자동으로 진행된다는 점이 핵심 장점입니다.\n\nTMR works by playing memory-associated sounds at low volume during sleep to gently reactivate specific memories. The approach leverages memory consolidation during slow-wave sleep (SWS) to reduce the emotional intensity of fear memories.\n\nIn a 4-week trial with 124 PTSD patients, nightly auditory TMR reduced core PTSD symptoms by an average of 47%, and up to 63% when combined with pharmacotherapy. The non-invasive, automated nature addresses a major obstacle in PTSD care: treatment adherence.`,

cy="80" r="32" fill="#1a2a1a" stroke="#6ee7b7" stroke-width="1" opacity="0.7"/>   <path d="M222 78 Q230 68 240 76 Q250 68 258 78" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.6"/>   <circle cx="240" cy="118" r="14" fill="#f5c5a3"/>   <!-- Device flashing green -->   <rect x="232" y="50" width="16" height="10" rx="3" fill="#6ee7b7"/>   <circle cx="240" cy="55" r="6" fill="none" stroke="#6ee7b7" stroke-width="1" opacity="0.4"/>   <circle cx="240" cy="55" r="10" fill="none" stroke="#6ee7b7" stroke-width="0.6" opacity="0.2"/>   <!-- Zap into brain -->   <text x="236" y="74" font-size="12" fill="#fbbf24">⚡</text>   <!-- Happy face -->   <path d="M234 122 Q240 130 246 122" fill="none" stroke="#6ee7b7" stroke-width="2"/>   <circle cx="235" cy="114" r="2" fill="#6ee7b7" opacity="0.8"/>   <circle cx="245" cy="114" r="2" fill="#6ee7b7" opacity="0.8"/>   <!-- Speech bubble -->   <rect x="168" y="28" width="82" height="30" rx="8" fill="#0a2a0a"/>   <rect x="168" y="28" width="82" height="30" rx="8" fill="none" stroke="#6ee7b7" stroke-width="1"/>   <polygon points="222,58 230,66 214,58" fill="#0a2a0a"/>   <text x="209" y="42" text-anchor="middle" font-size="10" fill="#6ee7b7">오늘도 괜찮다!</text>   <text x="209" y="52" text-anchor="middle" font-size="11" fill="#4a8a4a">Prevented! 😄</text>   <!-- Stars -->   <text x="168" y="118" font-size="10" fill="#fbbf24">✦</text>   <text x="300" y="110" font-size="10" fill="#fbbf24">✦</text>   <!-- Caption -->   <rect x="165" y="158" width="150" height="18" rx="4" fill="#0a120a"/>   <text x="240" y="170" text-anchor="middle" font-size="10" fill="#6ee7b7">DBS로 예방 / Prevented!</text> </svg>`,    tagLabel: `신경과학 / Neuroscience`,
    source: `Science`,
    time: `6시간 전 / 6h ago`,
    title: `뇌-컴퓨터 인터페이스(BCI)로 감정 상태 실시간 해석 — 우울증 조기 경보 시스템 개발\nBCI Decodes Emotional States in Real Time — Early Warning System for Depression`,
    summary: `UCSF 연구팀이 이식형 BCI를 통해 개인별 우울 삽화를 24시간 전 예측하는 알고리즘을 개발했다. 정확도 89%를 기록하며 정밀 정신의학의 새 지평을 열었다는 평가를 받는다.\nUCSF researchers developed an implanted BCI algorithm that predicts individual depressive episodes 24 hours in advance with 89% accuracy, opening a new era of precision psychiatry.`,
    aiSummary: `UCSF 연구팀이 개발한 이 시스템은 뇌의 측좌핵과 편도체에 미세 전극을 이식하여 신경 발화 패턴을 실시간으로 분석합니다. 수집된 데이터는 개인별로 훈련된 머신러닝 모델에 입력되어 우울 삽화 발생을 최대 24시간 전에 89%의 정확도로 예측합니다.\n\n단순 예측을 넘어, 우울 삽화가 임박했다고 판단될 경우 동일 기기가 자동으로 뇌심부자극(DBS)을 시행하여 증상을 예방하는 폐쇄 루프(closed-loop) 시스템을 구현했습니다. 현재 4명 파일럿 결과이며 2026년까지 30명으로 확대할 계획입니다.\n\nThe UCSF system implants microelectrodes in the nucleus accumbens and amygdala to analyze neural firing patterns in real time. A personalized machine learning model processes this data to predict depressive episodes up to 24 hours in advance with 89% accuracy.\n\nBeyond prediction, the system implements a closed-loop mechanism: when an episode is imminent, the same device automatically delivers deep brain stimulation (DBS) to prevent it — similar to responsive DBS used in Parkinson's disease treatment. Current results are from a 4-patient pilot; UCSF plans to expand to 30 patients by 2026.`,
    keyPoints: [`측좌핵·편도체 이식 전극으로 신경 패턴 실시간 분석 / Real-time neural analysis via implanted electrodes`, `우울 삽화 24시간 전 예측, 정확도 89% / 89% accuracy predicting depressive episodes 24h in advance`, `예측 즉시 자동 DBS 개입하는 폐쇄 루프 시스템 / Closed-loop system with automatic DBS intervention`, `난치성 우울증 환자 4명 파일럿 결과 / Pilot results from 4 treatment-resistant depression patients`, `2026년까지 30명 규모 확대 계획 / Planned expansion to 30 patients by 2026`],
    url: '#'
  },

    thumbnail: `<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">   <rect width="320" height="180" fill="#0f0d08"/>   <line x1="160" y1="0" x2="160" y2="180" stroke="#222" stroke-width="2"/>    <!-- PANEL 1: Pavlov's dog classic -->   <rect x="0" y="0" width="160" height="180" fill="#1a1408"/>   <!-- Bell (old school) -->   <ellipse cx="30" cy="40" rx="16" ry="20" fill="#fbbf24" opacity="0.4"/>   <rect x="22" y="58" width="16" height="6" rx="2" fill="#fbbf24" opacity="0.5"/>   <ellipse cx="30" cy="63" rx="4" ry="4" fill="#fbbf24" opacity="0.6"/>   <text x="30" y="20" text-anchor="middle" font-size="10" fill="#fbbf24" opacity="0.7">🔔</text>   <!-- Sound waves from bell -->   <path d="M46 42 Q55 35 64 42" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="3 2"/>   <!-- Classic dog -->   <ellipse cx="110" cy="130" rx="30" ry="16" fill="#8B6914" opacity="0.7"/>   <circle cx="90" cy="118" r="14" fill="#8B6914" opacity="0.8"/>   <!-- Dog eyes -->   <circle cx="86" cy="114" r="2.5" fill="#111"/>   <circle cx="94" cy="114" r="2.5" fill="#111"/>   <!-- Dog tongue (drooling) -->   <path d="M86 122 Q90 130 94 122" fill="#f9a8d4" stroke="#f9a8d4" stroke-width="0.5"/>   <path d="M88 122 Q90 134 92 126" fill="#f9a8d4"/>   <!-- Dog ears -->   <ellipse cx="84" cy="108" rx="7" ry="10" fill="#6B4914" opacity="0.8"/>   <ellipse cx="96" cy="108" rx="7" ry="10" fill="#6B4914" opacity="0.8"/>   <!-- Drool drops -->   <text x="80" y="145" font-size="10" fill="#93c5fd" opacity="0.7">💧💧💧</text>   <!-- Label: 파블로프 1901 -->   <rect x="5" y="25" width="68" height="16" rx="4" fill="#1a1000"/>   <text x="39" y="36" text-anchor="middle" font-size="10" fill="#fbbf24">파블로프 1901</text>   <!-- Caption -->   <rect x="5" y="158" width="150" height="18" rx="4" fill="#1a1000"/>   <text x="80" y="170" text-anchor="middle" font-size="10" fill="#fbbf24">고전 조건화 / Classic</text>    <!-- PANEL 2: Modern human = same dog -->   <rect x="160" y="0" width="160" height="180" fill="#0f0d08"/>   <!-- Phone -->   <rect x="200" y="30" width="36" height="60" rx="7" fill="#1a1810"/>   <rect x="200" y="30" width="36" height="60" rx="7" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>   <rect x="204" y="36" width="28" height="44" rx="3" fill="#0d0f12"/>   <!-- Notification on phone -->   <rect x="207" y="42" width="22" height="8" rx="2" fill="#fbbf24" opacity="0.5"/>   <text x="218" y="48" text-anchor="middle" font-size="6" fill="#fbbf24">💬 1</text>   <!-- Ding! -->   <text x="243" y="55" font-size="11" fill="#fbbf24">🔔</text>   <path d="M252 50 Q258 44 264 50" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5" stroke-dasharray="2 2"/>   <!-- Modern human - same drooling reaction -->   <circle cx="275" cy="110" r="15" fill="#f5c5a3"/>   <!-- Same dog-like eyes -->   <circle cx="270" cy="106" r="2.5" fill="#111"/>   <circle cx="280" cy="106" r="2.5" fill="#111"/>   <!-- Drooling tongue -->   <path d="M269 116 Q275 124 281 116" fill="#f9a8d4" stroke="#f9a8d4" stroke-width="0.5"/>   <path d="M272 116 Q275 126 278 120" fill="#f9a8d4"/>   <!-- Drool -->   <text x="262" y="136" font-size="10" fill="#93c5fd" opacity="0.7">💧💧💧</text>   <!-- Label: 현대인 2025 -->   <rect x="165" y="25" width="68" height="16" rx="4" fill="#1a1000"/>   <text x="199" y="36" text-anchor="middle" font-size="10" fill="#fbbf24">현대인 2025</text>   <!-- Speed badge -->   <rect x="165" y="150" width="60" height="22" rx="5" fill="#1a1000"/>   <text x="195" y="162" text-anchor="middle" font-size="11" fill="#fbbf24">3× 빠름!</text>   <text x="195" y="170" text-anchor="middle" font-size="11" fill="#888">3x faster</text>   <!-- = sign between panels at middle -->   <text x="168" y="118" text-anchor="middle" font-size="18" fill="#fbbf24" opacity="0.8">=</text> </svg>`,    tagLabel: `행동과학 / Behavioral Science`,
    source: `PNAS`,
    time: `8시간 전 / 8h ago`,
    title: `소셜미디어 알림음 조건화 효과, 파블로프 조건화보다 빠른 습관 형성 속도 확인\nSmartphone Notification Sounds Condition Behavior 3x Faster Than Pavlovian Conditioning`,
    summary: `스마트폰 알림음이 도파민 분비를 유발하는 조건 자극으로 기능하며, 전통적인 파블로프 조건화보다 3배 빠른 속도로 습관을 형성한다는 연구결과가 PNAS에 게재됐다.\nSmartphone notification sounds function as conditioned stimuli triggering dopamine release, forming behavioral habits 3x faster than classical Pavlovian conditioning.`,
    aiSummary: `이 연구는 스마트폰 알림음이 단순한 소리를 넘어 강력한 행동 조건화 자극으로 작동한다는 것을 신경생물학적으로 입증했습니다. fMRI와 행동 측정을 결합한 실험에서, 참가자들은 알림음을 처음 들은 지 단 3일 만에 도파민성 보상 회로가 활성화되는 조건 반응을 보였습니다.\n\n연구팀은 이러한 초고속 조건화가 가변 보상 스케줄, 사회적 보상(좋아요·댓글), 높은 반복 빈도(하루 평균 80회 이상)의 세 요인이 복합적으로 작용한 결과라고 분석했습니다. 알림음은 실제 알림이 없어도 유사한 소리에 반응하는 팬텀 진동 현상과 연결되며, 플랫폼 설계가 중독성을 의도적으로 강화하고 있음을 시사합니다.\n\nThis study provides neurobiological evidence that smartphone notification sounds operate as powerful behavioral conditioning stimuli. In experiments combining fMRI and behavioral measures, participants showed conditioned dopaminergic reward circuit activation after just 3 days — roughly 3x faster than classical Pavlovian conditioning.\n\nResearchers identified three compounding factors: variable reward schedules, coupling with social rewards (likes, comments), and high repetition frequency (80+ times/day). The conditioned response generalizes to similar sounds even without real notifications, linking to phantom vibration phenomena — suggesting platforms intentionally optimize for addictive engagement.`,
    keyPoints: [`알림음 노출 3일 만에 도파민 조건 반응 형성 / Dopamine conditioned response forms within 3 days`, `파블로프 조건화 대비 3배 빠른 습관 형성 / 3x faster habit formation than classical conditioning`, `가변 보상·사회적 보상·고빈도 반복의 3중 효과 / Triple effect: variable + social reward + high frequency`, `팬텀 진동 현상과 신경생물학적으로 연결 / Neurobiologically linked to phantom vibration`, `플랫폼 설계가 중독성 최적화 의도 시사 / Suggests platforms intentionally optimize for addiction`],
    url: '#'

    thumbnail: `<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">   <rect width="320" height="180" fill="#0d0f12"/>   <line x1="160" y1="0" x2="160" y2="180" stroke="#222" stroke-width="2"/>    <!-- PANEL 1: Researcher tests GPT-4 personality -->   <rect x="0" y="0" width="160" height="180" fill="#0d0f18"/>   <!-- Researcher character -->   <circle cx="35" cy="75" r="13" fill="#f5c5a3"/>   <rect x="27" y="88" width="16" height="22" rx="4" fill="#4a6a8a"/>   <!-- Clipboard/questionnaire -->   <rect x="50" y="62" width="50" height="60" rx="4" fill="#eee" opacity="0.9"/>   <rect x="54" y="68" width="40" height="4" rx="1" fill="#333" opacity="0.5"/>   <rect x="54" y="76" width="34" height="3" rx="1" fill="#333" opacity="0.4"/>   <rect x="54" y="83" width="38" height="3" rx="1" fill="#333" opacity="0.4"/>   <rect x="54" y="90" width="28" height="3" rx="1" fill="#333" opacity="0.4"/>   <text x="75" y="112" text-anchor="middle" font-size="11" fill="#555">Big Five</text>   <!-- Pen -->   <rect x="100" y="60" width="4" height="26" rx="2" fill="#f9a8d4" transform="rotate(-20, 102, 73)"/>   <!-- Speech bubble: "성격 테스트 해봐!" -->   <rect x="4" y="32" width="98" height="30" rx="8" fill="#1a1a3a"/>   <rect x="4" y="32" width="98" height="30" rx="8" fill="none" stroke="#93c5fd" stroke-width="1"/>   <polygon points="28,62 22,70 36,62" fill="#1a1a3a"/>   <text x="53" y="46" text-anchor="middle" font-size="10" fill="#93c5fd">성격 테스트 해봐!</text>   <text x="53" y="57" text-anchor="middle" font-size="11" fill="#6a8aaa">Take personality test!</text>   <!-- GPT box -->   <rect x="105" y="90" width="50" height="42" rx="8" fill="#1a2a1a"/>   <rect x="105" y="90" width="50" height="42" rx="8" fill="none" stroke="#6ee7b7" stroke-width="1"/>   <text x="130" y="108" text-anchor="middle" font-size="10" fill="#6ee7b7">GPT-4</text>   <text x="130" y="120" text-anchor="middle" font-size="10">🤖</text>   <text x="130" y="128" text-anchor="middle" font-size="11" fill="#4a8a6a">성실성 ↑↑</text>   <!-- Caption -->   <rect x="5" y="158" width="150" height="18" rx="4" fill="#0d0f18"/>   <text x="80" y="170" text-anchor="middle" font-size="10" fill="#93c5fd">1회차 / Test #1</text>    <!-- PANEL 2: 100th time, same result -->   <rect x="160" y="0" width="160" height="180" fill="#0d0f18"/>   <!-- Exhausted researcher (100 tests later) -->   <circle cx="195" cy="75" r="13" fill="#f5c5a3"/>   <rect x="187" y="88" width="16" height="22" rx="4" fill="#4a6a8a"/>   <!-- Tired eyes, sweat -->   <text x="188" y="71" font-size="6" fill="#333">—  —</text>   <text x="202" y="72" font-size="10" fill="#93c5fd" opacity="0.7">💧</text>   <!-- Stack of papers (100 tests) -->   <rect x="215" y="85" width="52" height="6" rx="1" fill="#ddd" opacity="0.6"/>   <rect x="215" y="80" width="52" height="6" rx="1" fill="#eee" opacity="0.7"/>   <rect x="215" y="75" width="52" height="6" rx="1" fill="#fff" opacity="0.8"/>   <text x="241" y="73" text-anchor="middle" font-size="11" fill="#555">× 100!</text>   <!-- GPT-4 box - same face -->   <rect x="262" y="100" width="50" height="42" rx="8" fill="#1a2a1a"/>   <rect x="262" y="100" width="50" height="42" rx="8" fill="none" stroke="#6ee7b7" stroke-width="1"/>   <text x="287" y="118" text-anchor="middle" font-size="10" fill="#6ee7b7">GPT-4</text>   <text x="287" y="130" text-anchor="middle" font-size="10">🤖</text>   <text x="287" y="138" text-anchor="middle" font-size="11" fill="#4a8a6a">성실성 ↑↑</text>   <!-- Same result badge -->   <rect x="165" y="52" width="84" height="26" rx="8" fill="#0a2a0a"/>   <rect x="165" y="52" width="84" height="26" rx="8" fill="none" stroke="#6ee7b7" stroke-width="1"/>   <text x="207" y="66" text-anchor="middle" font-size="10" fill="#6ee7b7">또 똑같아...!</text>   <text x="207" y="76" text-anchor="middle" font-size="11" fill="#4a8a6a">r = 0.91 🤯</text>   <!-- Caption -->   <rect x="165" y="158" width="150" height="18" rx="4" fill="#0d0f18"/>   <text x="240" y="170" text-anchor="middle" font-size="10" fill="#6ee7b7">100회차도 같음 / Same!</text> </svg>`,    tagLabel: `AI 연구 / AI Research`,
    source: `arXiv (심리학 / Psychology)`,
    time: `10시간 전 / 10h ago`,
    title: `LLM의 인격 일관성 — GPT-4는 Big Five 성격 검사에서 안정적 프로파일 유지\nLLM Personality Consistency — GPT-4 Maintains Stable Big Five Profile`,
    summary: `같은 LLM 모델에 반복적으로 성격 검사를 실시한 결과, 인간 수준의 내적 일관성을 보이는 것으로 나타났다. 이는 AI 인격 연구의 새로운 방법론 논쟁으로 이어지고 있다.\nRepeated personality testing on the same LLM revealed human-level internal consistency, sparking new methodological and philosophical debates in AI personality research.`,
    aiSummary: `이 연구는 GPT-4를 포함한 9개 대형 언어 모델에 Big Five 성격 검사(OCEAN 모델)를 수백 회 반복 실시하여 응답 일관성을 측정했습니다. GPT-4의 재검사 신뢰도는 r=0.91로, 인간 평균(r=0.85)을 상회했습니다. 특히 성실성과 외향성 차원에서 가장 높은 안정성이 관찰됐습니다.\n\n이 발견은 두 가지 상반된 해석을 낳고 있습니다. 하나는 LLM이 훈련 데이터의 통계적 패턴을 반영하는 것뿐이라는 도구적 해석이고, 다른 하나는 충분히 복잡한 시스템에서 성격과 유사한 창발적 특성이 나타날 수 있다는 해석입니다. 이 논쟁은 AI 의인화의 윤리적 함의로까지 이어지고 있습니다.\n\nThis study administered the Big Five inventory hundreds of times to 9 LLMs, measuring response consistency. GPT-4 achieved test-retest reliability of r=0.91, surpassing the human average (r=0.85), with the highest stability in Conscientiousness and Extraversion.\n\nThis has generated two competing interpretations: an instrumental view (LLMs simply reflect training data patterns) versus an emergentist view (sufficiently complex systems may develop personality-like properties). The debate extends into ethical implications — risks of anthropomorphization and potential exploitation of AI for emotional labor.`,

function buildSummaryHTML(item, summary) {
  const parts = summary.split('\n\n');
  const half = Math.ceil(parts.length / 2);
  const koText = parts.slice(0, half).join('\n\n');
  const enText = parts.slice(half).join('\n\n');
  const points = item.keyPoints.map(p => `<div class="key-point">${p}</div>`).join('');
  return `
    <div class="ai-lang-label">한국어 KO</div>
    <p>${koText || summary}</p>
    <hr class="ai-panel-divider">
    <div class="ai-lang-label">English EN</div>
    <p>${enText || ''}</p>
    <div class="key-points">
      <div style="font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-bottom:8px;">핵심 포인트 / Key Points</div>
      ${points}
    </div>`;
}
 
// Cache: pre-generate summaries for all cards on page load
const summaryCache = {};
 
async function prefetchSummary(item) {
  if (summaryCache[item.id]) return;
  summaryCache[item.id] = 'loading';
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `다음 심리학/AI 뉴스를 한국어와 영어로 각각 3-4문장씩 요약해주세요. 핵심 연구결과와 의의에 집중하고, 일반인도 이해할 수 있게 설명해주세요. 한국어 요약 후 빈 줄 두 개, 그 다음 영어 요약을 써주세요.\n\n제목: ${item.title}\n\n내용: ${item.summary}`
        }]
      })
    });
    const data = await response.json();
    summaryCache[item.id] = data.content?.[0]?.text || item.aiSummary;
  } catch (err) {
    summaryCache[item.id] = item.aiSummary;
  }
}
 
function startPrefetch() {
  // Stagger prefetch requests to avoid rate limiting
  NEWS_DATA.forEach((item, i) => {
    setTimeout(async () => {
      await prefetchSummary(item);
      // Mark button as ready
      const btn = document.querySelector(`[onclick="toggleAI(${item.id}, event)"]`);
      if (btn) btn.classList.add('cached');
    }, i * 800);
  });
}
 
function toggleAI(id, e) {
  e.stopPropagation();
  const panel = document.getElementById(`ai-${id}`);
  const bodyEl = document.getElementById(`ai-body-${id}`);
  const item = NEWS_DATA.find(i => i.id === id);
 
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    return;
  }
 
  panel.classList.add('open');
 
  // Already cached and ready?
  if (summaryCache[id] && summaryCache[id] !== 'loading') {
    bodyEl.innerHTML = buildSummaryHTML(item, summaryCache[id]);
    return;
  }
 
  // Show loading, then wait for cache or fetch directly
  bodyEl.innerHTML = `<div class="ai-loading">요약 생성 중 / Generating<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;
 
  const poll = setInterval(() => {
    if (summaryCache[id] && summaryCache[id] !== 'loading') {
      clearInterval(poll);
      bodyEl.innerHTML = buildSummaryHTML(item, summaryCache[id]);
    }
  }, 300);
 
  // Fallback: if not prefetched yet, fetch immediately
  if (!summaryCache[id]) {
    prefetchSummary(item);
  }
 
  // Safety timeout — use built-in summary after 12s
  setTimeout(() => {
    clearInterval(poll);
    if (bodyEl.innerHTML.includes('ai-loading')) {
      summaryCache[id] = item.aiSummary;
      bodyEl.innerHTML = buildSummaryHTML(item, item.aiSummary);
    }
  }, 12000);
}
 
function toggleSave(id, e) {

  document.getElementById('stat-saved').textContent = savedIds.size;
  renderFeed();
}

if (isIOS && !isStandalone) {
  setTimeout(() => {
    document.getElementById('installBanner').classList.add('visible');
  }, 2000);
}
 
// Service Worker for offline
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'mindfeed-v1';
    const ASSETS = ['./', './index.html'];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
 
renderFeed();
renderTrends();
renderSources();
 
// Start prefetching summaries in background after 1.5s
setTimeout(startPrefetch, 1500);
</script>
