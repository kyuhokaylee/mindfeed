<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MindFeed — 심리학 × AI 뉴스</title>
<meta name="description" content="심리학과 AI 연구 최신 뉴스를 AI 요약으로 빠르게">
<meta name="theme-color" content="#0d0f12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MindFeed">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --surface: #161a1f;
    --surface2: #1e242c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaed;
    --muted: #7a8290;
    --accent: #6ee7b7;
    --accent2: #93c5fd;
    --accent3: #f9a8d4;
    --tag-psych: #1e3a2f;
    --tag-psych-text: #6ee7b7;
    --tag-ai: #1e2a3a;
    --tag-ai-text: #93c5fd;
    --tag-neuro: #2d1e3a;
    --tag-neuro-text: #c4b5fd;
    --tag-behav: #3a2a1e;
    --tag-behav-text: #fbbf24;
    --font-main: 'Gowun Dodum', sans-serif;
    --font-serif: 'Noto Serif KR', serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,18,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 0.5px solid var(--border2);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #6ee7b7, #93c5fd);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 17px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(110,231,183,0.08);
    border: 0.5px solid rgba(110,231,183,0.2);
    border-radius: 20px;
    padding: 4px 10px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .refresh-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text);
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-family: var(--font-main);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-btn:hover { background: #252d38; border-color: var(--border2); }
  .refresh-btn:active { transform: scale(0.97); }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-label {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    white-space: nowrap;
    margin-right: 4px;
  }

  .filter-chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    font-family: var(--font-main);
  }

  .filter-chip:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

  .filter-chip.active {
    background: rgba(110,231,183,0.1);
    border-color: rgba(110,231,183,0.35);
    color: var(--accent);
  }

  /* ===== LAYOUT ===== */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 28px;
  }

  @media (max-width: 820px) {
    .container { grid-template-columns: 1fr; padding: 16px 14px 90px; }
    .sidebar { display: none; }
    .container > main { min-width: 0; }
    header { padding: 0 16px; height: 54px; }
    .logo-sub { display: none; }
    .live-badge { display: none; }
    .refresh-btn { padding: 6px 10px; font-size: 12px; }
    .filter-bar { padding: 10px 14px; gap: 8px; }
    .filter-chip { padding: 5px 11px; font-size: 11px; }
    .filter-label { display: none; }
    .news-card { padding: 16px; }
    .featured-card { padding: 18px; }
    .featured-title { font-size: 17px; padding-right: 70px; }
    .card-title { font-size: 15px; }
    .scroll-top { bottom: 80px; }
    .toast { bottom: 80px; }
  }

  /* ===== BOTTOM NAV (mobile only) ===== */
  .bottom-nav { display: none; }

  @media (max-width: 820px) {
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(13,15,18,0.96);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--border2);
      z-index: 200;
      align-items: center;
      justify-content: space-around;
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 16px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.18s;
      font-family: var(--font-main);
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-icon { font-size: 20px; line-height: 1; }
    .bottom-nav-label { font-size: 10px; font-family: var(--font-mono); }
  }

  /* ===== PWA INSTALL BANNER ===== */
  .install-banner {
    display: none;
    margin: 12px 14px 0;
    background: linear-gradient(135deg, rgba(110,231,183,0.08), rgba(147,197,253,0.08));
    border: 0.5px solid rgba(110,231,183,0.2);
    border-radius: var(--radius);
    padding: 14px 16px;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.4s ease;
  }
  .install-banner.visible { display: flex; }
  .install-banner-text { flex: 1; }
  .install-banner-title { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .install-banner-sub { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  .install-btn {
    background: rgba(110,231,183,0.15);
    border: 0.5px solid rgba(110,231,183,0.3);
    color: var(--accent);
    font-size: 12px;
    font-family: var(--font-mono);
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .install-btn:active { background: rgba(110,231,183,0.25); }
  .install-close {
    background: none; border: none;
    color: var(--muted); font-size: 18px;
    cursor: pointer; padding: 4px; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }

  @media (max-width: 820px) {
    .ai-summary-btn, .save-btn { min-height: 36px; }
    .news-card:active { background: var(--surface2); }
    .featured-card:active { border-color: rgba(110,231,183,0.4); }
  }

  /* ===== FEED ===== */
  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .feed-title {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .sort-select {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--muted);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    cursor: pointer;
  }

  .news-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .news-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.2s;
  }

  .news-card:hover { border-color: var(--border2); background: var(--surface2); }
  .news-card:hover::before { background: var(--accent); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .tag-psych { background: var(--tag-psych); color: var(--tag-psych-text); }
  .tag-ai { background: var(--tag-ai); color: var(--tag-ai-text); }
  .tag-neuro { background: var(--tag-neuro); color: var(--tag-neuro-text); }
  .tag-behav { background: var(--tag-behav); color: var(--tag-behav-text); }

  .card-source {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .card-time {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .card-title {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .card-summary {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .ai-summary-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--accent2);
    background: rgba(147,197,253,0.07);
    border: 0.5px solid rgba(147,197,253,0.18);
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .ai-summary-btn:hover { background: rgba(147,197,253,0.13); }

  .save-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: var(--radius-sm);
    transition: color 0.18s;
  }

  .save-btn:hover { color: var(--accent3); }
  .save-btn.saved { color: var(--accent3); }

  .read-link {
    margin-left: auto;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--muted);
    text-decoration: none;
    transition: color 0.18s;
  }
  .read-link:hover { color: var(--text); }

  /* AI Summary Panel */
  .ai-panel {
    background: rgba(147,197,253,0.04);
    border: 0.5px solid rgba(147,197,253,0.15);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-top: 12px;
    display: none;
  }

  .ai-panel.open { display: block; animation: fadeIn 0.25s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .ai-panel-header {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--accent2);
    margin-bottom: 10px;
  }

  .ai-panel-body {
    font-size: 13px;
    color: #b0bac8;
    line-height: 1.7;
  }

  .ai-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  .key-points {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid rgba(147,197,253,0.1);
  }

  .key-point {
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: #9ca8b8;
    margin-bottom: 5px;
  }

  .key-point::before {
    content: '▸';
    color: var(--accent2);
    flex-shrink: 0;
  }

  /* ===== SIDEBAR ===== */
  .sidebar { }

  .sidebar-section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 18px;
  }

  .sidebar-title {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-title::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-card {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
  }

  .trend-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }
  .trend-item:last-child { border-bottom: none; padding-bottom: 0; }
  .trend-item:first-child { padding-top: 0; }
  .trend-item:hover .trend-keyword { color: var(--accent); }

  .trend-rank {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    min-width: 20px;
    margin-top: 2px;
  }

  .trend-keyword {
    font-size: 13px;
    color: var(--text);
    transition: color 0.15s;
    line-height: 1.4;
  }

  .trend-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .source-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }
  .source-item:last-child { border-bottom: none; }

  .source-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .source-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* FEATURED CARD */
  .featured-card {
    background: linear-gradient(135deg, #0f2a1e 0%, #0f1e2a 100%);
    border: 0.5px solid rgba(110,231,183,0.2);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .featured-card::after {
    content: 'FEATURED';
    position: absolute;
    top: 16px;
    right: 16px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    background: rgba(110,231,183,0.1);
    padding: 3px 8px;
    border-radius: 4px;
    border: 0.5px solid rgba(110,231,183,0.2);
  }

  .featured-card:hover { border-color: rgba(110,231,183,0.4); }

  .featured-title {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.45;
    margin: 10px 0 10px;
    padding-right: 80px;
  }

  .featured-summary {
    font-size: 13px;
    color: #8a9aaa;
    line-height: 1.65;
    margin-bottom: 14px;
  }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-mono);
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 999;
    transition: transform 0.3s ease;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scroll top btn */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 38px;
    height: 38px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--muted);
    transition: all 0.2s;
    opacity: 0;
  }
  .scroll-top.visible { opacity: 1; }
  .scroll-top:hover { color: var(--text); background: #252d38; }
</style>
</head>
<body>

<header>
  <a href="#" class="logo">
    <div class="logo-icon">🧠</div>
    <div>
      <div class="logo-text">MindFeed</div>
      <div class="logo-sub">심리학 × AI 뉴스</div>
    </div>
  </a>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <button class="refresh-btn" onclick="refreshFeed()">
      ↻ 새로고침
    </button>
  </div>
</header>

<div class="install-banner" id="installBanner">
  <div class="install-banner-text">
    <div class="install-banner-title">🧠 홈 화면에 앱으로 추가</div>
    <div class="install-banner-sub">오프라인에서도 빠르게 열 수 있어요</div>
  </div>
  <button class="install-btn" id="installBtn">추가하기</button>
  <button class="install-close" onclick="document.getElementById('installBanner').classList.remove('visible')">×</button>
</div>

<div class="filter-bar">
  <span class="filter-label">필터:</span>
  <button class="filter-chip active" onclick="setFilter(this, 'all')">전체</button>
  <button class="filter-chip" onclick="setFilter(this, 'psych')">🧪 심리학</button>
  <button class="filter-chip" onclick="setFilter(this, 'ai')">🤖 AI 연구</button>
  <button class="filter-chip" onclick="setFilter(this, 'neuro')">🔬 신경과학</button>
  <button class="filter-chip" onclick="setFilter(this, 'behav')">📊 행동과학</button>
  <button class="filter-chip" onclick="setFilter(this, 'saved')">★ 저장됨</button>
</div>

<div class="container">
  <main>
    <div class="feed-header">
      <span class="feed-title" id="feed-count">오늘의 뉴스 · 불러오는 중...</span>
      <select class="sort-select" onchange="sortFeed(this.value)">
        <option value="latest">최신순</option>
        <option value="hot">인기순</option>

}

function renderCard(item) {

  const tagClass = getTagClass(item.tag);

  if (item.featured) {
    return `
    <div class="featured-card" id="card-${item.id}">

        <button class="ai-summary-btn" onclick="toggleAI(${item.id}, event)">✦ AI 요약 보기</button>

        </button>
        <a href="${item.url}" class="read-link" onclick="event.stopPropagation()">원문 →</a>
      </div>
      <div class="ai-panel" id="ai-${item.id}">
        <div class="ai-panel-header">✦ Claude AI 요약</div>
        <div class="ai-panel-body" id="ai-body-${item.id}"></div>
      </div>
    </div>`;
  }

  return `
  <div class="news-card" id="card-${item.id}">
    <div class="card-meta">

      <span class="card-source">${item.source}</span>

      <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave(${item.id}, event)">
        ${isSaved ? '★' : '☆'} ${isSaved ? '저장됨' : '저장'}
      </button>

}

function renderFeed() {
  let items = [...NEWS_DATA];

  if (currentFilter !== 'all' && currentFilter !== 'saved') {
    items = items.filter(i => i.tag === currentFilter);
  }
  if (currentFilter === 'saved') {
    items = items.filter(i => savedIds.has(i.id));
  }

  const container = document.getElementById('feed-container');
  const countEl = document.getElementById('feed-count');

  if (items.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:48px;color:var(--muted);font-family:var(--font-mono);font-size:13px;">저장된 뉴스가 없습니다</div>`;
    countEl.textContent = `0건`;
    return;
  }

  countEl.textContent = `오늘의 뉴스 · ${items.length}건`;
  container.innerHTML = items.map(renderCard).join('');

  document.getElementById('stat-total').textContent = NEWS_DATA.length;
  document.getElementById('stat-ai').textContent = NEWS_DATA.length;
  document.getElementById('stat-journals').textContent = '12';
  document.getElementById('stat-saved').textContent = savedIds.size;
}

function toggleAI(id, e) {
  e.stopPropagation();
  const panel = document.getElementById(`ai-${id}`);
  const bodyEl = document.getElementById(`ai-body-${id}`);
  const item = NEWS_DATA.find(i => i.id === id);

  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    return;
  }

  panel.classList.add('open');
  bodyEl.innerHTML = `<div class="ai-loading">요약 생성 중 <span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;

  setTimeout(async () => {
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `다음 심리학/AI 뉴스를 한국어로 3-4문장으로 간결하게 요약해주세요. 핵심 연구결과와 의의에 집중하고, 일반인도 이해할 수 있게 쉽게 설명해주세요.\n\n제목: ${item.title}\n\n내용: ${item.summary}`
          }]
        })
      });
      const data = await response.json();
      const summary = data.content?.[0]?.text || item.aiSummary;

      const points = item.keyPoints.map(p => `<div class="key-point">${p}</div>`).join('');
      bodyEl.innerHTML = `
        <p>${summary}</p>
        <div class="key-points">
          <div style="font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-bottom:8px;">핵심 포인트</div>
          ${points}
        </div>`;
    } catch (err) {
      const points = item.keyPoints.map(p => `<div class="key-point">${p}</div>`).join('');
      bodyEl.innerHTML = `
        <p>${item.aiSummary}</p>
        <div class="key-points">
          <div style="font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-bottom:8px;">핵심 포인트</div>
          ${points}
        </div>`;
    }
  }, 900);
}

function toggleSave(id, e) {
  e.stopPropagation();
  if (savedIds.has(id)) {
    savedIds.delete(id);
    showToast('스크랩에서 제거했습니다');
  } else {
    savedIds.add(id);
    showToast('★ 스크랩에 저장했습니다');
  }
  document.getElementById('stat-saved').textContent = savedIds.size;
  renderFeed();
}

function setFilter(btn, filter) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));

  currentFilter = filter;
  renderFeed();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

      <span class="source-count">${s.count}건</span>
    </div>`).join('');
}

window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  btn.classList.toggle('visible', window.scrollY > 400);
});

// Bottom nav sync with filter
function setBottomNav(btn, filter) {
  document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Also sync top filter chips
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.textContent.includes(
      filter === 'all' ? '전체' : filter === 'psych' ? '심리학' : filter === 'ai' ? 'AI' : filter === 'neuro' ? '신경' : '저장'
    ));
  });
  currentFilter = filter;
  renderFeed();
}

  document.getElementById('installBanner').classList.add('visible');
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      document.getElementById('installBanner').classList.remove('visible');
      showToast('홈 화면에 추가됐습니다!');
    }
    deferredPrompt = null;
  } else {
    // iOS fallback instructions
    showToast('Safari 메뉴 → 홈 화면에 추가를 눌러주세요');
  }
});

// iOS: show banner if in Safari (not standalone)
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone) {
  setTimeout(() => {
    document.getElementById('installBanner').classList.add('visible');
  }, 2000);
}

// Service Worker for offline
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'mindfeed-v1';
    const ASSETS = ['./', './index.html'];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

renderFeed();
renderTrends();
renderSources();
</script>
</body>
</html>
